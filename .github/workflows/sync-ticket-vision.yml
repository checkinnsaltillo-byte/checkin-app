name: Sync · Ticket Vision → /admin/

# Mantiene el contenido de la carpeta /admin/ en sincronía con el branch
# `main` del repo `checkinnsaltillo-byte/ticket-vision`. Cuando el repo
# de Ticket Vision se actualice (o cada 6 horas como fallback), este
# workflow descarga su contenido estático (index.html, styles.css, app.js)
# y lo commitea aquí. El pipeline de deploy-pages.yml luego lo publica
# automáticamente como /admin/ del sitio Check-inn.
#
# Disparadores:
#   - Cada 6h por cron (red de seguridad).
#   - Manual desde la pestaña Actions ("Run workflow").
#   - Vía repository_dispatch tipo "ticket-vision-updated" desde el repo
#     de Ticket Vision (configurar webhook si quieres push-instant).

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [ticket-vision-updated]

concurrency:
  group: sync-ticket-vision
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout ticket-vision main (read-only)
        uses: actions/checkout@v4
        with:
          repository: checkinnsaltillo-byte/ticket-vision
          ref: main
          path: tv-src

      - name: Copy static files to /admin/
        run: |
          mkdir -p admin
          # Sólo los 3 archivos que GitHub Pages sirve. Dockerfile,
          # cloudbuild.yaml y files/ son del backend Cloud Run — no aplican.
          cp tv-src/index.html admin/index.html
          cp tv-src/styles.css admin/styles.css
          cp tv-src/app.js     admin/app.js
          rm -rf tv-src

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet admin/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambios en /admin/."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Cambios detectados en /admin/."
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/
          git commit -m "chore(admin): sync ticket-vision main → /admin/"
          git push origin main

      # IMPORTANTE: el push del paso anterior se hace con GITHUB_TOKEN, y
      # GitHub por diseño NO dispara otros workflows cuando se autentica
      # con ese token (anti-loop). Por eso deploy-pages.yml se quedaba en
      # el commit previo al sync, y www.check-inn.mx/admin/ servía la
      # versión vieja hasta que alguien disparara Pages manualmente.
      # Aquí lo encadenamos explícitamente vía workflow_dispatch (que sí
      # se puede invocar con GITHUB_TOKEN).
      - name: Trigger deploy-pages.yml
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-pages.yml --ref main --repo ${{ github.repository }}
