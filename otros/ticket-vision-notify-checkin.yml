name: Notify · check-in (sync /admin/)

# Cuando se hace push al branch `master` de este repo (ticket-vision),
# disparar el workflow "Sync · Ticket Vision → /admin/" en el repo
# checkinnsaltillo-byte/checkin-app vía repository_dispatch. Esto hace
# que /admin/ del sitio check-inn.mx se actualice en segundos.
#
# Requiere un secret CHECKIN_DISPATCH_TOKEN — un Personal Access Token
# (fine-grained) con permiso `Contents: write` sobre el repo checkin-app.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Notify checkin-app to sync /admin/
        env:
          DISPATCH_TOKEN: ${{ secrets.CHECKIN_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "❌ Secret CHECKIN_DISPATCH_TOKEN no configurado."
            exit 1
          fi
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/checkinnsaltillo-byte/checkin-app/dispatches" \
            -d '{"event_type":"ticket-vision-updated","client_payload":{"source_sha":"${{ github.sha }}"}}'
          echo "✅ Dispatch enviado a checkin-app."
