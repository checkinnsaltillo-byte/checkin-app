<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#f1f5f9;color:#1e293b;font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;line-height:1.55;overflow-x:hidden}
body{padding-bottom:100px}
img{max-width:100%;display:block}
a{color:inherit}
.logo-bar{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:10px 16px;display:flex;align-items:center;justify-content:center}
.logo-bar-inner{display:inline-flex;align-items:center;gap:4px}
.logo-bar img.tx{height:32px}
.logo-bar img.pn{height:36px}
.hero{position:relative;color:#fff;overflow:hidden;border-radius:0 0 30px 30px;background:#1e293b;min-height:340px;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 22px}
.hero-bg{position:absolute;inset:0;background:#1e293b}
.hero-card{position:relative;z-index:2;max-width:440px;background:rgba(15,23,42,.35);border:1px solid rgba(255,255,255,.25);backdrop-filter:blur(6px);border-radius:20px;padding:22px 26px}
.hero-badge{display:inline-block;font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);padding:6px 13px;border-radius:999px;backdrop-filter:blur(4px);white-space:nowrap;margin-bottom:18px}
.hero h1{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1.2;margin:0 0 8px;text-shadow:0 2px 8px rgba(0,0,0,.35)}
.hero p{font-size:15px;opacity:.92;max-width:340px;margin:0 auto 18px;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.hero .btn-photos{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:8px 18px;font-size:13px;font-weight:700;backdrop-filter:blur(6px);text-decoration:none}
.quicknav{position:sticky;top:0;z-index:20;background:rgba(241,245,249,.95);backdrop-filter:blur(10px);border-bottom:1px solid #e2e8f0;padding:10px 0;overflow-x:auto;white-space:nowrap;margin:0 0 14px}
.quicknav::-webkit-scrollbar{display:none}
.quicknav a{display:inline-block;text-decoration:none;color:#64748b;font-size:13px;font-weight:600;padding:8px 14px;margin:0 4px;background:#fff;border:1px solid #e2e8f0;border-radius:999px}
.wrap{max-width:none;padding:14px 12px 32px}
details.section{background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 10px -4px rgba(15,23,42,.10);scroll-margin-top:70px}
details.section>summary{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;list-style:none;user-select:none}
details.section>summary::-webkit-details-marker{display:none}
.sec-ico{flex:none;width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:22px;color:#fff}
.sec-title{flex:1;min-width:0;font-size:15px;font-weight:700;color:#0f172a}
.chev{color:#94a3b8;font-size:12px}
.sec-body{padding:2px 18px 18px}
.kv{display:flex;gap:10px;padding:10px 0;border-bottom:1px dashed #e2e8f0}
.kv .k{flex:none;width:120px;font-weight:600;font-size:13px;color:#0f172a}
.kv .v{flex:1;font-size:13.5px;color:#334155}
.callout{display:flex;gap:12px;background:#fffbeb;border:1px solid #fde68a;border-left:4px solid #f59e0b;border-radius:12px;padding:13px;margin-top:12px;font-size:13px;color:#334155}
.callout .ci{font-size:18px}
.btn-map{display:block;text-align:center;text-decoration:none;margin-bottom:12px;background:linear-gradient(135deg,#f97316,#f59e0b);color:#fff;font-weight:700;font-size:14px;padding:13px;border-radius:12px;box-shadow:0 4px 12px -4px rgba(249,115,22,.5)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;padding:7px 12px;border-radius:10px;background:#f0fdfa;color:#0f766e;border:1px solid #99f6e4}
.chip.no{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.rule{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #f1f5f9}
.rule .mk{flex:none;width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:13px;font-weight:700;color:#fff}
.rule .mk.yes{background:#16a34a}
.rule .mk.no{background:#dc2626}
.rule .mk.info{background:#f59e0b}
.rule .t{font-size:13.5px;flex:1;color:#334155}
.iconrow{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #f1f5f9}
.iconrow .mk{flex:none;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:15px;background:#f0fdfa}
.iconrow .t{font-size:13.5px;flex:1;color:#334155}
.steps{position:relative;margin-top:6px}
.step{position:relative;padding:2px 0 18px 44px}
.step .num{position:absolute;left:0;top:0;width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#f97316,#f59e0b);color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px}
.step .line{position:absolute;left:14px;top:32px;bottom:2px;width:2px;background:#e2e8f0}
.step h4{font-size:14px;font-weight:700;color:#0f172a;margin:0}
.step p{font-size:13px;color:#64748b;margin:2px 0 0}
.wifi{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:16px;padding:18px;color:#fff;margin-top:4px}
.wifi .row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.12)}
.wifi .row:last-child{border-bottom:0}
.wifi .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.7}
.wifi .val{font-size:16px;font-weight:700;font-family:'Courier New',monospace}
.wifi button{background:#f59e0b;color:#3b2500;border:0;font-weight:700;font-size:12px;padding:8px 14px;border-radius:10px;cursor:pointer}
.emerg{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.emerg a{display:flex;align-items:center;gap:12px;text-decoration:none;color:#334155;background:#fef2f2;border:1px solid #fecaca;border-radius:13px;padding:13px 14px}
.emerg .em-ico{width:40px;height:40px;border-radius:11px;color:#fff;display:grid;place-items:center;font-size:19px;flex:none;background:#dc2626}
.emerg .em-t{flex:1}
.emerg .em-t b{font-size:14px;display:block}
.emerg .em-t span{font-size:12px;color:#64748b}
.emerg .em-call{font-size:12px;font-weight:700;color:#dc2626}
.checkin-fab{position:fixed;left:0;right:0;bottom:0;z-index:9400;padding:14px 16px 18px;background:linear-gradient(180deg,rgba(15,23,42,0),rgba(15,23,42,.55));pointer-events:none}
.checkin-fab .cin-row{display:flex;align-items:stretch;gap:10px;max-width:520px;margin:0 auto;pointer-events:none}
.checkin-fab #checkin-btn{pointer-events:auto;flex:1 1 auto;min-width:0;padding:16px 20px;background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;border:0;border-radius:14px;font-size:15px;font-weight:800;letter-spacing:.02em;cursor:pointer;box-shadow:0 12px 28px -6px rgba(220,38,38,.6);animation:cinPulse 2.2s ease-in-out infinite;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.checkin-fab #checkin-btn span{display:inline-flex;align-items:center;gap:10px;justify-content:center}
.wa-fab{pointer-events:auto;display:flex;flex:none;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.wa-fab a{width:56px;height:56px;border-radius:16px;background:#25d366;color:#fff;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 10px 24px -4px rgba(37,211,102,.55),inset 0 -3px 6px rgba(0,0,0,.12);border:1px solid rgba(255,255,255,.15)}
.wa-fab a svg{width:28px;height:28px;fill:#fff;display:block}
.wa-fab span{font-size:10px;font-weight:700;color:#0f172a;background:rgba(255,255,255,.95);padding:2px 6px;border-radius:8px;box-shadow:0 2px 6px rgba(15,23,42,.18);white-space:nowrap}
@keyframes cinPulse{0%,100%{box-shadow:0 12px 28px -6px rgba(220,38,38,.6);transform:translateY(0)}50%{box-shadow:0 18px 40px -4px rgba(220,38,38,.85);transform:translateY(-2px)}}
.cin-modal{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(15,23,42,.92);z-index:9999;overflow:hidden}
.cin-modal-head{position:absolute;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;color:#fff;box-sizing:border-box;gap:12px}
.cin-modal-head .t{font-size:14px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cin-modal-head button{all:unset;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.cin-modal iframe{position:absolute;top:56px;left:0;width:100%;height:calc(100% - 56px);border:0;background:transparent;display:block}
.wa-fab a{width:60px;height:60px;border-radius:18px;background:#25d366;color:#fff;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 10px 24px -4px rgba(37,211,102,.55),inset 0 -3px 6px rgba(0,0,0,.12);border:1px solid rgba(255,255,255,.15)}
.wa-fab a svg{width:32px;height:32px;fill:#fff;display:block}
.wa-fab span{font-size:11px;font-weight:700;color:#0f172a;background:rgba(255,255,255,.95);padding:2px 8px;border-radius:8px;box-shadow:0 2px 6px rgba(15,23,42,.18)}
.state{padding:80px 20px;text-align:center;color:#64748b;font-size:14px}
.state .sp{width:44px;height:44px;border:3px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

<script>
const BACKEND = 'https://ticket-vision-957627511957.northamerica-south1.run.app';

// ────────────────────────── helpers ──────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function V(a, ...keys) {
  for (const k of keys) { const v = a && a[k]; if (v != null && String(v).trim() !== '') return String(v).trim(); }
  return '';
}
function listOf(str, opts) {
  const sep = opts && opts.comma ? /\r?\n|;|\||,/ : /\r?\n|;|\|/;
  return String(str||'').split(sep)
    .map(s => s.trim())
    .map(s => s.replace(/^\s*(?:[•\-–*]|[a-zA-Z]\)|\d+[.)])\s*/, '').trim())
    .filter(Boolean);
}

// Ícono por palabras clave (mismo mapa que app.js)
function guiIcon(text) {
  const t = String(text||'').toLowerCase();
  const map = [
    [/check.?out.*(esta|misma).*p[aá]gina|realiza.*check.?out|check.?out.*app/, '💻'],
    [/lockbox|caja de seg|dep[oó]sit[oa].*llav|deja.*llav|entrega.*llav/, '🔐'],
    [/apaga.*(luz|luces|aire|clima|aparat)/, '💡'],
    [/cierra.*(ventana|puerta|con llave)|cerrar.*puerta/, '🚪'],
    [/trastes|lavavajillas|fregader|platos sucios/, '🍽️'],
    [/basura|contenedor|residuos/, '🗑️'],
    [/limpieza|limpiar|ordenad|dejar limpio/, '🧽'],
    [/revis|revisi[oó]n|check.?list/, '✅'],
    [/wi ?fi|internet/, '📶'],
    [/aire acond|a\/c|\bac\b|clima/, '❄️'],
    [/calefac|calent(ador|amiento)|calor/, '🔥'],
    [/smart\s?tv|\btv\b|televis/, '📺'],
    [/utensili|cubierto|cuchar|tenedor|olla|sart[eé]n/, '🥄'],
    [/cocin/, '🍳'],
    [/cafetera|caf[eé]/, '☕'],
    [/\bt[eé]\b/, '🍵'],
    [/refrig|nevera|frigo/, '🧊'],
    [/lavador|lavander/, '🧺'],
    [/secador/, '🌀'],
    [/estacion|parking|cochera|garage/, '🅿️'],
    [/agua caliente|regader|duch/, '🚿'],
    [/toalla/, '🛁'],
    [/shampoo|gel|amenidades? de bañ/, '🧴'],
    [/jab[oó]n/, '🧼'],
    [/papel higi[eé]n/, '🧻'],
    [/ropa de cama|s[aá]bana|almohada|cama|colch[oó]n/, '🛏️'],
    [/sal|aceite|b[aá]sicos|especias|az[uú]car/, '🧂'],
    [/basura|residuos/, '🗑️'],
    [/llave|acceso|puerta/, '🔑'],
    [/mascota|perro|gato/, '🐾'],
    [/fumar|tabaco|cigarr/, '🚭'],
    [/luz|luces|apaga/, '💡'],
    [/ventana|cerrar/, '🪟'],
    [/aire libre|terraza|patio|jard[ií]n/, '🌿'],
    [/piscina|alberca/, '🏊'],
    [/microondas/, '🍲'],
    [/plancha/, '👔'],
    [/tomacorriente|enchufe|carga/, '🔌'],
    [/agua purificad|agua embotellad|garraf[oó]n/, '💧'],
  ];
  for (const [rx, ic] of map) if (rx.test(t)) return ic;
  return '•';
}

function kv(k, v) {
  if (!v) return '';
  return `<div class="kv"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`;
}
function callout(text, icon) {
  if (!text) return '';
  return `<div class="callout"><span class="ci">${icon||'💡'}</span><div>${esc(text)}</div></div>`;
}
function chips(list) {
  if (!list.length) return '';
  return `<div class="chips">${list.map(c => {
    const no = /^no\s|^sin\s|^prohib/i.test(c);
    return `<span class="chip${no?' no':''}"><span style="font-size:14px">${guiIcon(c)}</span>${esc(c)}</span>`;
  }).join('')}</div>`;
}
function rules(list) {
  if (!list.length) return '';
  return list.map(t => {
    let mark = '!', cls = 'info';
    if (/^\s*(no|prohibid|✗|✘)/i.test(t)) { mark='✗'; cls='no'; }
    else if (/^\s*(sí|si\b|✓|✔|permitid|se permit)/i.test(t)) { mark='✓'; cls='yes'; }
    return `<div class="rule"><div class="mk ${cls}">${mark}</div><div class="t">${esc(t)}</div></div>`;
  }).join('');
}
function iconList(list) {
  if (!list.length) return '';
  return list.map(t => `<div class="iconrow"><div class="mk">${guiIcon(t)}</div><div class="t">${esc(t)}</div></div>`).join('');
}
function steps(list) {
  if (!list.length) return '';
  return `<div class="steps">${list.map((raw, i) => {
    const p = raw.indexOf('('), c = raw.lastIndexOf(')');
    let title = raw.trim(), desc = '';
    if (p > 0 && c > p) { title = raw.slice(0,p).trim().replace(/[:\-–]\s*$/,''); desc = raw.slice(p+1,c).trim(); }
    const last = i === list.length-1;
    return `<div class="step"><div class="num">${i+1}</div>${!last?'<div class="line"></div>':''}<h4 style="font-weight:${desc?700:500}">${esc(title)}</h4>${desc?`<p>${esc(desc)}</p>`:''}</div>`;
  }).join('')}</div>`;
}
function wifi(red, pass, aviso) {
  if (!red && !pass && !aviso) return '<div style="font-size:12px;color:#94a3b8;font-style:italic">Datos de Wi-Fi no configurados.</div>';
  return `<div class="wifi">
    ${red?`<div class="row"><div><div class="lbl">Red</div><div class="val">${esc(red)}</div></div></div>`:''}
    ${pass?`<div class="row"><div><div class="lbl">Contraseña</div><div class="val" id="wifi-pass">${esc(pass)}</div></div><button type="button" onclick="copyWifi('${esc(pass).replace(/'/g,"\\'")}',this)">Copiar</button></div>`:''}
  </div>${callout(aviso,'📡')}`;
}
function copyWifi(txt, btn) {
  navigator.clipboard?.writeText(txt).then(() => {
    const o = btn.textContent; btn.textContent = '¡Copiado!';
    setTimeout(()=>btn.textContent=o, 1800);
  });
}
function emerg(n1, num1, n2, num2) {
  const card = (nombre, num, i) => {
    if (!nombre && !num) return '';
    const bg = i === 0 ? '#dc2626' : '#0891b2';
    return `<a href="${num?`tel:${esc(String(num).replace(/[^0-9+]/g,''))}`:'#'}">
      <div class="em-ico" style="background:${bg}">👤</div>
      <div class="em-t"><b>${esc(nombre||'Contacto')}</b><span>${esc(num||'Sin número')}</span></div>
      ${num?'<div class="em-call">Llamar</div>':''}
    </a>`;
  };
  return `<div class="emerg">${card(n1,num1,0)}${card(n2,num2,1)}</div>`;
}
function section(id, ico, icoBg, title, inner, open) {
  return `<details class="section" id="${id}"${open?' open':''}><summary><div class="sec-ico" style="background:${icoBg}">${ico}</div><div class="sec-title">${esc(title)}</div><div class="chev">▼</div></summary><div class="sec-body">${inner}</div></details>`;
}
window.addEventListener('message', ev => {
  const data = ev.data || {};
  if (data.type === 'checkin-close') { document.getElementById('cin-modal')?.remove(); }
  else if (data.type === 'checkin-wa-request') {
    const phone = window.__waPhone || ''; const msg = window.__waMsg || '';
    if (phone) window.open(`https://wa.me/${encodeURIComponent(phone)}?text=${encodeURIComponent(msg)}`, '_blank', 'noopener');
  }
});

window.openCheckin = function () {
  document.getElementById('cin-modal')?.remove();
  const el = document.createElement('div');
  el.id = 'cin-modal';
  el.className = 'cin-modal';
  el.innerHTML = `
    <div class="cin-modal-head">
      <div class="t">✅ Realizar registro (Check-in)</div>
      <button type="button" onclick="document.getElementById('cin-modal')?.remove()" title="Regresar a Guía de Bienvenida">← Regresar a Guía de Bienvenida</button>
    </div>
    <iframe src="https://www.check-inn.mx/public/registro/?embed=1#express" title="Registro exprés" allow="camera; geolocation"></iframe>`;
  const onKey = ev => { if (ev.key === 'Escape') { el.remove(); document.removeEventListener('keydown', onKey); } };
  document.addEventListener('keydown', onKey);
  document.body.appendChild(el);
};

window.openVehiculos = function () {
  document.getElementById('cin-modal')?.remove();
  const el = document.createElement('div');
  el.id = 'cin-modal';
  el.className = 'cin-modal';
  el.innerHTML = `
    <div class="cin-modal-head">
      <div class="t">🚗 Información de vehículos</div>
      <button type="button" onclick="document.getElementById('cin-modal')?.remove()" title="Regresar a Guía de Bienvenida">← Regresar a Guía de Bienvenida</button>
    </div>
    <iframe src="https://www.check-inn.mx/public/registro/?embed=1#vehiculos" title="Información de vehículos" allow="camera; geolocation"></iframe>`;
  const onKey = ev => { if (ev.key === 'Escape') { el.remove(); document.removeEventListener('keydown', onKey); } };
  document.addEventListener('keydown', onKey);
  document.body.appendChild(el);
};

window.jumpTo = function (id) {
  const el = document.getElementById(id);
  if (!el) return false;
  if (el.tagName === 'DETAILS' && !el.open) el.open = true;
  el.scrollIntoView({behavior:'smooth',block:'start'});
  return false;
};

// ────────────────────────── render ──────────────────────────
function buildGuide(a) {
  const g = (...ks) => V(a, ...ks);
  // Mismo criterio que guiasItemLabel del admin: usa titulo_txt como
  // título principal; si no hay, Propiedad · #Departamento; fallback HouseName.
  const tituloTxt = g('titulo_txt');
  const prop = g('Propiedad');
  const dpt = g('# Departamento');
  const nombre = tituloTxt || (prop && dpt ? `${prop} · #${dpt}` : (prop || g('HouseName') || 'Alojamiento'));
  $('hero-title').textContent = nombre;
  const photoUrl = g('url_lodgify');
  if (photoUrl) { $('hero-photos').href = photoUrl; $('hero-photos').style.display = 'inline-flex'; }
  // WhatsApp
  const wa = g('contacto_whatsapp').replace(/[^0-9+]/g,'');
  if (wa) {
    const msg = `Hola, estoy hospedado en ${nombre}. Mi nombre es: `;
    $('wa-link').href = `https://wa.me/${encodeURIComponent(wa)}?text=${encodeURIComponent(msg)}`;
    $('wa-fab').style.display = 'flex';
    window.__waPhone = wa;
    window.__waMsg = msg;
  }
  // Meta OG
  document.title = `${nombre} · Guía · Check-inn Saltillo`;
  $('og-title').setAttribute('content', `${nombre} · Guía de Bienvenida`);
  $('og-desc').setAttribute('content', nombre);
  // Sections
  // Orden final. Parrilla solo si tiene contenido.
  const hasGrill = listOf(g('parrilla')).length > 0;
  const recoUrls = String(g('restaurantes','Restaurantes') || '').split(';').map(s => s.trim()).filter(s => /^https?:\/\//i.test(s));
  const hasRecos = recoUrls.length > 0;
  const secList = [
    ['gu-loc','📍','linear-gradient(135deg,#0ea5e9,#38bdf8)','Ubicación y cómo llegar'],
    ['gu-house','🏠','linear-gradient(135deg,#8b5cf6,#a78bfa)','Características del alojamiento'],
    ['gu-arr','🚪','linear-gradient(135deg,#2563eb,#60a5fa)','Método de llegada'],
    ['gu-rules','📋','linear-gradient(135deg,#dc2626,#f87171)','Reglamento de la casa'],
    ['gu-time','🕐','linear-gradient(135deg,#f59e0b,#fbbf24)','Horas de entrada y salida'],
    ['gu-wifi','📶','linear-gradient(135deg,#7c3aed,#c084fc)','Conexión WiFi'],
    ['gu-park','🅿️','linear-gradient(135deg,#475569,#94a3b8)','Estacionamiento'],
    ['gu-wash','🧺','linear-gradient(135deg,#0891b2,#22d3ee)','Lavandería'],
    ['gu-supply','🧴','linear-gradient(135deg,#16a34a,#4ade80)','Insumos disponibles'],
    ['gu-amen','✨','linear-gradient(135deg,#0f766e,#14b8a6)','Amenidades'],
    ...(hasGrill ? [['gu-grill','🔥','linear-gradient(135deg,#c2410c,#f97316)','Parrilla eléctrica']] : []),
    ['gu-out','👋','linear-gradient(135deg,#ea580c,#fb923c)','Instrucciones de salida'],
    ...(hasRecos ? [['gu-reco','🍽️','linear-gradient(135deg,#7c2d12,#ea580c)','Recomendaciones']] : []),
    ['gu-emerg','🚨','linear-gradient(135deg,#b91c1c,#ef4444)','Contacto de emergencia'],
  ];
  $('quicknav').innerHTML = secList.map(([id,ic,,t]) => `<a href="#${id}" onclick="return jumpTo('${id}')">${ic} ${t.split(' ')[0]}</a>`).join('');
  const capacidadRaw = g('capacidad');
  const capacidad = capacidadRaw ? (/hu[eé]sped/i.test(capacidadRaw) ? capacidadRaw : `${capacidadRaw} huéspedes máx.`) : '';
  const sec1Inner = `${g('url_google_maps')?`<a class="btn-map" href="${esc(g('url_google_maps'))}" target="_blank" rel="noopener">🧭 Abrir en Google Maps</a>`:''}${kv('Dirección', g('direccion'))}${kv('Referencia', g('referencia'))}${callout(g('referencia_googlemaps'),'💡')}`;
  const sec2Inner = `${kv('Tipo', g('tipo'))}${kv('Capacidad', capacidad)}${kv('Recámaras', g('recamaras'))}${kv('Baños', g('banos','Banos'))}${kv('Planta', g('planta','Planta'))}`;
  const sec3Inner = chips(listOf(g('amenidades'), {comma:true})) || '<div style="font-size:12px;color:#94a3b8;font-style:italic">Sin amenidades listadas.</div>';
  const sec4Inner = rules(listOf(g('reglamento'))) || '<div style="font-size:12px;color:#94a3b8;font-style:italic">Sin reglamento listado.</div>';
  const entrada = g('hora_llegada','hr_llegada'), salida = g('hora_salida','hr_salida');
  const sec5Inner = `<div style="display:flex;gap:12px;margin-top:6px"><div style="flex:1;text-align:center;padding:16px 8px;border-radius:14px;border:1px solid #a5f3fc;background:linear-gradient(135deg,#ecfeff,#f0fdfa)"><div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:4px">Entrada</div><div style="font-size:24px;font-weight:800;color:#0f172a">${esc(entrada||'—')}</div></div><div style="flex:1;text-align:center;padding:16px 8px;border-radius:14px;border:1px solid #fde68a;background:linear-gradient(135deg,#fff7ed,#fef9c3)"><div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:4px">Salida</div><div style="font-size:24px;font-weight:800;color:#0f172a">${esc(salida||'—')}</div></div></div>`;
  const deptoNote = dpt ? `<div style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #bfdbfe;border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:14px;color:#0f172a;text-align:center">Tu departamento es el <b style="font-weight:800;font-size:16px;color:#1d4ed8">#${esc(dpt)}</b></div>` : '';
  const sec6Inner = deptoNote + (steps(listOf(g('metodo_llegada'))) || '<div style="font-size:12px;color:#94a3b8;font-style:italic">Sin instrucciones de llegada.</div>');
  const sec7Inner = wifi(g('wifi_red','wifi_name_1'), g('wifi_contrasena'), g('wifi_aviso'));
  const sec8Inner = `${kv('Tipo', g('estacionamiento_tipo'))}${kv('Instrucciones', g('estacionamiento_instrucciones'))}${kv('En la calle', g('estacionamiento_calle'))}${callout(g('estacionamiento_aviso'),'🚗')}`;
  const regLav = listOf(g('lavanderia_reglamento'));
  const sec9Inner = `${kv('Ubicación', g('lavanderia_ubicacion'))}${kv('Acceso', g('lavanderia_acceso'))}${regLav.length?`<div style="padding:12px 0 4px"><div style="font-size:12.5px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Reglamento</div>${rules(regLav)}</div>`:''}${callout(g('lavanderia_aviso'),'👕')}`;
  const insList = listOf(g('insumos'), {comma:true});
  const sec10Inner = `${kv('Ubicación', g('insumos_ubicacion'))}${insList.length?`<div style="padding:7px 0"><div style="font-size:13px;font-weight:600;color:#0f172a;margin-bottom:6px">Algunos insumos disponibles</div>${chips(insList)}</div>`:''}${callout(g('insumos_aviso'),'🛒')}`;
  const salList = listOf(g('salida_instrucciones'));
  const sec11Inner = (salList.length ? iconList(salList) : '<div style="font-size:12px;color:#94a3b8;font-style:italic">Sin instrucciones de salida.</div>') + callout(g('salida_aviso'),'💚');
  const sec12Inner = emerg(g('contacto_emergencia_1_nombre'), g('contacto_emergencia_1_numero'), g('contacto_emergencia_2_nombre'), g('contacto_emergencia_2_numero'));
  const parrList = listOf(g('parrilla'));
  const sec13Inner = parrList.length ? steps(parrList) : '<div style="font-size:12px;color:#94a3b8;font-style:italic">Sin instrucciones de parrilla.</div>';
  const recoInner = hasRecos ? recoUrls.map((u,i) => {
    const rid = 'gu-reco-' + Math.random().toString(36).slice(2,9) + '-' + i;
    return `<div id="${rid}" data-reco-url="${esc(u)}" style="display:flex;gap:12px;padding:12px;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:10px;background:#fff;box-shadow:0 1px 4px -1px rgba(15,23,42,.06)"><div class="reco-img" style="flex:none;width:88px;height:88px;border-radius:10px;background:linear-gradient(135deg,#f1f5f9,#e2e8f0) center/cover;overflow:hidden;position:relative"><div style="position:absolute;inset:0;display:grid;place-items:center;font-size:24px;color:#94a3b8">🍽️</div></div><div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:6px"><div class="reco-title" style="font-size:14px;font-weight:700;color:#0f172a;line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">Cargando…</div><div class="reco-desc" style="font-size:11.5px;color:#64748b;line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical"></div><a href="${esc(u)}" target="_blank" rel="noopener" style="margin-top:auto;align-self:flex-start;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:#fff;background:#0d9488;text-decoration:none;padding:6px 12px;border-radius:8px">🗺️ Google Maps</a></div></div>`;
  }).join('') : '';
  const inners = [
    sec1Inner, sec2Inner, sec6Inner, sec4Inner, sec5Inner,
    sec7Inner, sec8Inner, sec9Inner, sec10Inner, sec3Inner,
    ...(hasGrill ? [sec13Inner] : []),
    sec11Inner,
    ...(hasRecos ? [recoInner] : []),
    sec12Inner,
  ];
  $('sections').innerHTML = secList.map(([id,ic,bg,t], i) => section(id, ic, bg, t, inners[i], i === 0)).join('');
  // Insertar tarjeta clickable "Información de vehículos" después de Estacionamiento
  const vehCard = `<div id="gu-veh" onclick="openVehiculos()" role="button" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openVehiculos()}" style="background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 10px -4px rgba(15,23,42,.10);cursor:pointer;transition:transform .12s,box-shadow .12s" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 16px -6px rgba(15,23,42,.18)'" onmouseout="this.style.transform='';this.style.boxShadow='0 2px 10px -4px rgba(15,23,42,.10)'"><div style="display:flex;align-items:center;gap:14px;padding:16px"><div style="flex:none;width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:22px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff">🚗</div><div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700;color:#0f172a">Información de vehículos</div><div style="font-size:12.5px;color:#64748b;margin-top:2px">Coordinación de estacionamiento con otros huéspedes</div></div><div style="color:#94a3b8;font-size:16px">›</div></div></div>`;
  const parkEl = document.getElementById('gu-park');
  if (parkEl) parkEl.insertAdjacentHTML('afterend', vehCard);
  // Hidratar cards de "Recomendaciones" con título + imagen via Microlink.
  document.querySelectorAll('[data-reco-url]').forEach(card => {
    if (card.dataset.recoHydrated === '1') return;
    card.dataset.recoHydrated = '1';
    const url = card.getAttribute('data-reco-url');
    fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`, { cache: 'no-store' })
      .then(r => r.json())
      .then(j => {
        if (!j || j.status !== 'success' || !j.data) return;
        const d = j.data;
        const title = card.querySelector('.reco-title');
        const desc  = card.querySelector('.reco-desc');
        const imgEl = card.querySelector('.reco-img');
        const cleanTitle = String(d.title || '').replace(/\s*-\s*Google Maps.*$/i, '').replace(/^Google Maps\s*[-·]\s*/i, '').trim();
        if (title) title.textContent = cleanTitle || 'Lugar recomendado';
        if (desc)  desc.textContent  = String(d.description || '').trim();
        const imgUrl = d.image?.url || d.logo?.url || '';
        if (imgEl && imgUrl) {
          imgEl.style.background = `url("${imgUrl}") center/cover, linear-gradient(135deg,#f1f5f9,#e2e8f0)`;
          const ph = imgEl.querySelector('div'); if (ph) ph.remove();
        }
      })
      .catch(() => {});
  });
  // Hero bg via microlink
  if (photoUrl) {
    fetch(`https://api.microlink.io/?url=${encodeURIComponent(photoUrl)}&screenshot=false`, {cache:'no-store'})
      .then(r => r.json())
      .then(j => {
        const u = j?.data?.image?.url;
        if (u) {
          $('hero-bg').style.background = `url("${u}") center/cover`;
          $('og-image').setAttribute('content', u);
        }
      }).catch(()=>{});
  }
}

// ────────────────────────── boot ──────────────────────────
(async function () {
  const params = new URLSearchParams(location.search);
  const id = (params.get('id') || '').trim();
  if (!id) {
    $('loader').style.display = 'none';
    $('notfound').style.display = 'block';
    $('notfound-msg').textContent = 'Falta el parámetro ?id= en la URL.';
    return;
  }
  try {
    const res = await fetch(`${BACKEND}/alojamientos-list`, { cache: 'no-store' });
    const data = await res.json();
    const rows = data.rows || [];
    const target = rows.find(r => {
      const rid = String(r.HouseId || r.HouseID || r.ID || '').trim();
      return rid.toLowerCase() === id.toLowerCase();
    });
    if (!target) {
      $('loader').style.display = 'none';
      $('notfound').style.display = 'block';
      $('notfound-msg').textContent = `No se encontró alojamiento con id "${id}".`;
      return;
    }
    buildGuide(target);
    $('loader').style.display = 'none';
    $('root').style.display = 'block';
    $('checkin-fab').style.display = 'block';
  } catch (err) {
    $('loader').style.display = 'none';
    $('notfound').style.display = 'block';
    $('notfound-msg').textContent = 'Error cargando datos. Intenta más tarde.';
    console.error(err);
  }
})();
</script>
